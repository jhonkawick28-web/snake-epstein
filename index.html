<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epstein Eats</title>

    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        h2 {
            margin: 10px;
        }

        #score {
            margin-bottom: 10px;
            font-size: 18px;
        }

        canvas {
            background: #000;
            border: 2px solid #00ffcc;
            touch-action: none;
        }
    </style>
</head>

<body>

    <h2>Epstein Eats</h2>
    <div id="score">Score: 0</div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // 🔥 Auto-fit screen
        let screenSize = Math.min(window.innerWidth, window.innerHeight - 120);
        canvas.width = screenSize;
        canvas.height = screenSize;

        // 🔲 Bigger grid
        const size = 20;   // smaller size = more grid blocks
        const tiles = Math.floor(canvas.width / size);

        let snake = [{ x: Math.floor(tiles / 2), y: Math.floor(tiles / 2) }];
        let direction = null;
        let food = spawnFood();
        let score = 0;

        let snakeImg = new Image();
        snakeImg.src = "snake.png";

        let pizzaImg = new Image();
        pizzaImg.src = "pizza.png";

        function spawnFood() {
            return {
                x: Math.floor(Math.random() * tiles),
                y: Math.floor(Math.random() * tiles)
            };
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                ctx.drawImage(
                    snakeImg,
                    snake[i].x * size,
                    snake[i].y * size,
                    size,
                    size
                );
            }

            // Draw pizza
            ctx.drawImage(
                pizzaImg,
                food.x * size,
                food.y * size,
                size,
                size
            );
        }

        function update() {
            if (!direction) return;

            let head = { x: snake[0].x, y: snake[0].y };

            if (direction == "LEFT") head.x--;
            if (direction == "RIGHT") head.x++;
            if (direction == "UP") head.y--;
            if (direction == "DOWN") head.y++;

            // wall collision
            if (head.x < 0 || head.y < 0 || head.x >= tiles || head.y >= tiles) {
                alert("Game Over");
                reset();
                return;
            }

            // self collision
            for (let part of snake) {
                if (part.x == head.x && part.y == head.y) {
                    alert("Game Over");
                    reset();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x == food.x && head.y == food.y) {
                score++;
                document.getElementById("score").innerText = "Score: " + score;
                food = spawnFood();
            } else {
                snake.pop();
            }
        }

        function game() {
            update();
            draw();
        }

        setInterval(game, 120);

        // Keyboard
        document.addEventListener("keydown", e => {
            if (e.key == "ArrowLeft" || e.key == "a") if (direction != "RIGHT") direction = "LEFT";
            if (e.key == "ArrowRight" || e.key == "d") if (direction != "LEFT") direction = "RIGHT";
            if (e.key == "ArrowUp" || e.key == "w") if (direction != "DOWN") direction = "UP";
            if (e.key == "ArrowDown" || e.key == "s") if (direction != "UP") direction = "DOWN";
        });

        // Swipe
        let startX = 0, startY = 0;

        canvas.addEventListener("touchstart", e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        canvas.addEventListener("touchend", e => {
            let dx = e.changedTouches[0].clientX - startX;
            let dy = e.changedTouches[0].clientY - startY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction != "LEFT") direction = "RIGHT";
                if (dx < 0 && direction != "RIGHT") direction = "LEFT";
            } else {
                if (dy > 0 && direction != "UP") direction = "DOWN";
                if (dy < 0 && direction != "DOWN") direction = "UP";
            }
        });

        function reset() {
            snake = [{ x: Math.floor(tiles / 2), y: Math.floor(tiles / 2) }];
            direction = null;
            score = 0;
            document.getElementById("score").innerText = "Score: 0";
            food = spawnFood();
        }
    </script>

</body>

</html>
